<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe8e8;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b8a;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff6b8a;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)" rx="25"/>
  <circle cx="200" cy="200" r="150" fill="url(#glow3)"/>
  <g transform="translate(140, 120)">
    <path d="M60 80 C 40 60, 20 40, 30 20 C 40 0, 60 10, 60 20 C 60 10, 80 0, 90 20 C 100 40, 80 60, 60 80 Z"
          fill="#ffb3c6" opacity="0.7" transform="scale(1.3)"/>
    <path d="M60 80 C 35 55, 15 35, 25 15 C 35 -5, 60 5, 60 15 C 60 5, 85 -5, 95 15 C 105 35, 85 55, 60 80 Z"
          fill="#ff9ebb" transform="scale(0.9) translate(7, 9)"/>
  </g>
  <g transform="translate(100, 80)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="16" fill="#c0392b" opacity="0.6" font-style="italic">You are always</text>
    <text x="0" y="20" font-family="Georgia, serif" font-size="16" fill="#c0392b" opacity="0.6" font-style="italic">on my mind</text>
  </g>
  <text x="200" y="300" font-family="Georgia, serif" font-size="24" fill="#c0392b" text-anchor="middle" font-weight="bold">I can not stop thinking</text>
  <text x="200" y="330" font-family="Georgia, serif" font-size="24" fill="#c0392b" text-anchor="middle" font-weight="bold">about you</text>
</svg>
