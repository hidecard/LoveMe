<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="horizon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffa07a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow5" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg5)" rx="25"/>
  <path d="M0 280 Q100 240, 200 270 Q300 300, 400 250 L400 400 L0 400 Z" fill="url(#horizon)" opacity="0.8"/>
  <circle cx="320" cy="100" r="45" fill="#ffd700" filter="url(#glow5)" opacity="0.9"/>
  <circle cx="320" cy="100" r="60" fill="#ffd700" opacity="0.2"/>
  <circle cx="70" cy="60" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="130" cy="90" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="200" cy="50" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="260" cy="120" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="340" cy="80" r="2" fill="#fff" opacity="0.5"/>
  <text x="200" y="180" font-family="Georgia, serif" font-size="24" fill="#fff" text-anchor="middle" opacity="0.9">I see a future</text>
  <text x="200" y="215" font-family="Georgia, serif" font-size="24" fill="#ffd700" text-anchor="middle" font-weight="bold">with you</text>
  <text x="200" y="250" font-family="Georgia, serif" font-size="18" fill="#fff" text-anchor="middle" opacity="0.8">Sunset after sunset</text>
</svg>
