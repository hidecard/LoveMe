  <path d="M188 190 Q200 205 212 190" stroke="#c0392b" stroke-width="3" fill="none" opacity="0.7" stroke-linecap="round"/>
  <circle cx="170" cy="165" r="10" fill="#ffb3c6" opacity="0.5"/>
