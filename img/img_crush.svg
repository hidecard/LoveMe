      <stop offset="0%" style="stop-color:#fff5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0e6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="blush1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffb3c6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#ffb3c6;stop-opacity:0" />
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ff9ebb" flood-opacity="0.4"/>
