<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stage11" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="0%" r="80%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </radialGradient>
    <filter id="stageGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg11)" rx="25"/>
  <rect x="50" y="280" width="300" height="20" rx="3" fill="url(#stage11)"/>
  <rect x="70" y="260" width="260" height="20" rx="3" fill="#444"/>
  <circle cx="200" cy="150" r="30" fill="#ff6b8a" filter="url(#stageGlow)"/>
  <path d="M200 180 L200 220 M180 200 L220 200" stroke="#ff6b8a" stroke-width="4" stroke-linecap="round"/>
  <rect x="180" y="120" width="40" height="10" rx="5" fill="#333"/>
  <circle cx="200" cy="115" r="4" fill="#ffd700"/>
  <rect x="120" y="290" width="60" height="40" rx="5" fill="#ff4444" opacity="0.3"/>
  <rect x="220" y="290" width="60" height="40" rx="5" fill="#44ff44" opacity="0.3"/>
  <text x="200" y="80" font-family="Georgia, serif" font-size="22" fill="#fff" text-anchor="middle" filter="url(#stageGlow)">One dance with me?</text>
  <text x="200" y="110" font-family="Georgia, serif" font-size="16" fill="#ffb3c6" text-anchor="middle" opacity="0.8">Under the spotlight</text>
  <text x="200" y="340" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle" font-style="italic">I promise not to step on your toes</text>
  <text x="200" y="360" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle" font-style="italic">okay, maybe once</text>
</svg>
