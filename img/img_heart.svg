<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="heartGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="#fff0f3" rx="20"/>
  <path d="M200 340 C 80 240, 40 160, 120 100 C 160 70, 200 100, 200 140 C 200 100, 240 70, 280 100 C 360 160, 320 240, 200 340 Z"
        fill="url(#heartGrad)" filter="url(#glow)" transform="scale(1.1) translate(-18, -30)"/>
  <text x="200" y="360" font-family="Georgia, serif" font-size="28" fill="#c0392b" text-anchor="middle" font-style="italic">Do you love me?</text>
</svg>
