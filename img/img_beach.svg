<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e1f5fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave10" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:1" />
    </linearGradient>
    <filter id="waterGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg10)" rx="25"/>
  <path d="M0 280 Q50 250, 100 270 Q150 290, 200 260 Q250 230, 300 260 Q350 290, 400 250 L400 400 L0 400 Z" fill="url(#wave10)" opacity="0.6"/>
  <path d="M0 300 Q50 270, 100 290 Q150 310, 200 280 Q250 250, 300 280 Q350 310, 400 270 L400 400 L0 400 Z" fill="url(#wave10)" opacity="0.4"/>
  <circle cx="200" cy="160" r="5" fill="#ffd700" filter="url(#waterGlow)"/>
  <circle cx="160" cy="120" r="3" fill="#ffd700" opacity="0.7"/>
  <circle cx="240" cy="130" r="4" fill="#ffd700" opacity="0.6"/>
  <g transform="translate(165, 90)">
    <ellipse cx="35" cy="70" rx="20" ry="35" fill="#333" transform="rotate(15 35 70)"/>
    <circle cx="35" cy="30" r="18" fill="#ffdbac"/>
    <circle cx="30" cy="28" r="2" fill="#333"/>
    <circle cx="40" cy="28" r="2" fill="#333"/>
    <path d="M32 35 Q35 38 38 35" stroke="#c0392b" stroke-width="1.5" fill="none"/>
    <text x="35" y="15" font-family="Georgia, serif" font-size="12" fill="#c0392b" text-anchor="middle">Hi!</text>
  </g>
  <g transform="translate(200, 100)">
    <ellipse cx="35" cy="70" rx="20" ry="35" fill="#e74c3c" transform="rotate(-10 35 70)"/>
    <circle cx="35" cy="30" r="18" fill="#ffdbac"/>
    <circle cx="30" cy="28" r="2" fill="#333"/>
    <circle cx="40" cy="28" r="2" fill="#333"/>
    <path d="M32 35 Q35 38 38 35" stroke="#c0392b" stroke-width="1.5" fill="none"/>
  </g>
  <text x="200" y="200" font-family="Georgia, serif" font-size="24" fill="#0277bd" text-anchor="middle" font-weight="bold">Take me to the beach?</text>
  <text x="200" y="235" font-family="Georgia, serif" font-size="16" fill="#0288d1" text-anchor="middle" font-style="italic">Sand between our toes</text>
  <text x="200" y="260" font-family="Georgia, serif" font-size="16" fill="#0288d1" text-anchor="middle" font-style="italic">and you by my side</text>
  <text x="200" y="300" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">Bonus: I will carry the cooler</text>
  <text x="200" y="320" font-family="Georgia, serif" font-size="14" fill="#666" text-anchor="middle">and protect you from seagulls</text>
</svg>
