  <rect width="400" height="400" fill="url(#bg7)" rx="25"/>
  <path d="M200 320 C 100 250, 60 180, 100 120 C 140 60, 180 90, 200 140 C 220 90, 260 60, 300 120 C 340 180, 300 250, 200 320 Z"
