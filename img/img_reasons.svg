<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fff0f3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#ff9ebb" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg4)" rx="25"/>
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="140" height="90" rx="12" fill="#fff" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow4)"/>
    <text x="70" y="40" font-family="Georgia, serif" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">Your smile</text>
    <text x="70" y="58" font-family="Georgia, serif" font-size="11" fill="#d6336c" text-anchor="middle" font-style="italic">lights up the room</text>
  </g>
  <g transform="translate(210, 50)">
    <rect x="0" y="0" width="140" height="90" rx="12" fill="#fff" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow4)"/>
    <text x="70" y="40" font-family="Georgia, serif" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">Your laugh</text>
    <text x="70" y="58" font-family="Georgia, serif" font-size="11" fill="#d6336c" text-anchor="middle" font-style="italic">is my favorite sound</text>
  </g>
  <g transform="translate(50, 170)">
    <rect x="0" y="0" width="140" height="90" rx="12" fill="#fff" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow4)"/>
    <text x="70" y="40" font-family="Georgia, serif" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">Your kindness</text>
    <text x="70" y="58" font-family="Georgia, serif" font-size="11" fill="#d6336c" text-anchor="middle" font-style="italic">touches my heart</text>
  </g>
  <g transform="translate(210, 170)">
    <rect x="0" y="0" width="140" height="90" rx="12" fill="#fff" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow4)"/>
    <text x="70" y="40" font-family="Georgia, serif" font-size="13" fill="#c0392b" text-anchor="middle" font-weight="bold">Your presence</text>
    <text x="70" y="58" font-family="Georgia, serif" font-size="11" fill="#d6336c" text-anchor="middle" font-style="italic">makes me better</text>
  </g>
  <text x="200" y="310" font-family="Georgia, serif" font-size="22" fill="#c0392b" text-anchor="middle" font-weight="bold">You make my world</text>
  <text x="200" y="340" font-family="Georgia, serif" font-size="22" fill="#c0392b" text-anchor="middle" font-weight="bold">better every day</text>
</svg>
