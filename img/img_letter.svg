<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff0f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="paper6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef9f9;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow6" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#ff9ebb" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg6)" rx="25"/>
  <rect x="60" y="50" width="280" height="300" rx="8" fill="url(#paper6)" stroke="#e74c3c" stroke-width="1.5" filter="url(#shadow6)"/>
  <line x1="90" y1="90" x2="310" y2="90" stroke="#ffcccc" stroke-width="1"/>
  <line x1="90" y1="120" x2="310" y2="120" stroke="#ffcccc" stroke-width="1"/>
  <line x1="90" y1="150" x2="310" y2="150" stroke="#ffcccc" stroke-width="1"/>
  <line x1="90" y1="180" x2="250" y2="180" stroke="#ffcccc" stroke-width="1"/>
    <text x="90" y="110" font-family="Georgia, serif" font-size="14" fill="#c0392b" opacity="0.7" font-style="italic">My Dearest,</text>
    <text x="90" y="140" font-family="Georgia, serif" font-size="13" fill="#555" opacity="0.9">From the moment I met you,</text>
    <text x="90" y="165" font-family="Georgia, serif" font-size="13" fill="#555" opacity="0.9">my world became brighter.</text>
    <text x="90" y="195" font-family="Georgia, serif" font-size="13" fill="#c0392b" opacity="0.8" font-style="italic">You are my favorite thought.</text>
    <text x="340" y="295" font-family="Georgia, serif" font-size="14" fill="#c0392b" text-anchor="end">With love,</text>
    <text x="340" y="320" font-family="Georgia, serif" font-size="16" fill="#c0392b" text-anchor="end" font-weight="bold">Me</text>
</svg>
