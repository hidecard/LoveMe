<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunset8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fecfef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow8">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#ff9ebb" flood-opacity="0.4"/>
    </filter>
    <filter id="softGlow8">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg8)" rx="25"/>
  <path d="M0 280 Q100 250, 200 270 Q300 290, 400 250 L400 400 L0 400 Z" fill="url(#sunset8)" opacity="0.7"/>
  <circle cx="320" cy="120" r="35" fill="#ffd700" opacity="0.9" filter="url(#softGlow8)"/>
  <g transform="translate(120, 260)">
    <path d="M20 40 L20 80 M7 55 L20 40 L33 55" stroke="#555" stroke-width="2" fill="none"/>
    <circle cx="20" cy="20" r="15" fill="#333"/>
    <circle cx="16" cy="16" r="2" fill="#fff" opacity="0.8"/>
    <path d="M20 35 L20 20 M15 25 L25 25" stroke="#ff6b8a" stroke-width="2" stroke-linecap="round"/>
  </g>
  <text x="200" y="180" font-family="Georgia, serif" font-size="22" fill="#c0392b" text-anchor="middle" font-style="italic">Watch the sunset with me?</text>
  <text x="200" y="210" font-family="Georgia, serif" font-size="18" fill="#d6336c" text-anchor="middle" opacity="0.9">Just you, me, and the sky</text>
  <text x="200" y="240" font-family="Georgia, serif" font-size="16" fill="#666" text-anchor="middle" font-style="italic">I will bring the warmth</text>
</svg>
